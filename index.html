<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PintPoint – Cheapest pints in Cambridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1 class="brand">PintPoint</h1>
        <p class="tagline">Find the cheapest pint in Cambridge</p>
      </header>

      <div class="search-section">
        <label for="search" class="visually-hidden">Search pubs by name or address</label>
        <input type="search" id="search" class="search-input" placeholder="Search pubs..." autocomplete="off" />
        <div class="sort-row">
          <label for="sort">Sort by</label>
          <select id="sort" class="sort-select" aria-label="Sort pubs">
            <option value="price-asc">Cheapest first</option>
            <option value="price-desc">Most expensive first</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
      </div>

      <div class="sidebar-scroll">
        <button type="button" class="cheapest-callout" id="cheapest-callout" aria-label="Show cheapest pub on map">
          <span class="cheapest-label">Cheapest in Cambridge</span>
          <span class="cheapest-pub" id="cheapest-pub-name">—</span>
          <span class="cheapest-pint-name" id="cheapest-pub-pint-name"></span>
          <span class="cheapest-price" id="cheapest-pub-price">—</span>
        </button>
        <div class="pub-list" id="pub-list" role="list">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>

    <main class="map-container">
      <div id="map" class="map" aria-label="Map of Cambridge pubs"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
