<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PintPoint – Cheapest pints in Cambridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="app">
    <button type="button" class="mobile-view-toggle mobile-view-toggle--list" id="mobile-toggle-list" aria-label="Switch to pub list">
      <svg class="mobile-toggle-icon" viewBox="0 0 24 32" width="20" height="26" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round" d="M6 2h12l-1.5 26H7.5L6 2z"/>
        <path fill="currentColor" d="M7 6h10v16c0 2-2 4-5 4s-5-2-5-4V6z" opacity="0.5"/>
        <path fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.9" d="M7 6h10"/>
      </svg>
      Switch to Pub-list
    </button>
    <aside class="sidebar">
      <header class="sidebar-header">
        <button type="button" class="mobile-view-toggle mobile-view-toggle--map" id="mobile-toggle-map" aria-label="Back to map">
          ← Back to Map
        </button>
        <h1 class="brand">
          <svg class="brand-logo" viewBox="0 0 24 32" width="28" height="36" aria-hidden="true">
            <!-- Pint glass: tapered sides, rim, base -->
            <path fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round" d="M6 2h12l-1.5 26H7.5L6 2z"/>
            <!-- Beer -->
            <path fill="currentColor" d="M7 6h10v16c0 2-2 4-5 4s-5-2-5-4V6z" opacity="0.5"/>
            <!-- Foam -->
            <path fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.9" d="M7 6h10"/>
          </svg>
          <span class="brand-text">PintPoint</span>
        </h1>
        <p class="tagline">Find the cheapest pint in Cambridge</p>
        <button type="button" class="about-button" id="about-button">About PintPoint</button>
      </header>

      <div class="search-section">
        <label for="search" class="visually-hidden">Search pubs by name or address</label>
        <input type="search" id="search" class="search-input" placeholder="Search pubs..." autocomplete="off" />
        <div class="sort-row">
          <label for="sort">Sort by</label>
          <select id="sort" class="sort-select" aria-label="Sort pubs">
            <option value="price-asc">Cheapest first</option>
            <option value="price-desc">Most expensive first</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
      </div>

      <div class="sidebar-scroll">
        <button type="button" class="cheapest-callout" id="cheapest-callout" aria-label="Show cheapest pub on map">
          <span class="cheapest-label">Cheapest in Cambridge</span>
          <span class="cheapest-pub" id="cheapest-pub-name">—</span>
          <span class="cheapest-pint-name" id="cheapest-pub-pint-name"></span>
          <span class="cheapest-price" id="cheapest-pub-price">—</span>
          <span class="cheapest-address-row"><span id="cheapest-pub-address"></span> <a id="cheapest-pub-maps-link" href="#" target="_blank" rel="noopener noreferrer" class="cheapest-maps-link" title="Open in Google Maps" aria-label="Open address in Google Maps" onclick="event.stopPropagation()"><svg class="maps-link-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg></a></span>
        </button>
        <div class="pub-list" id="pub-list" role="list">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>

    <main class="map-container">
      <div id="map" class="map" aria-label="Map of Cambridge pubs"></div>
    </main>
  </div>

  <div class="about-overlay" id="about-overlay" aria-hidden="true">
    <div class="about-dialog" role="dialog" aria-modal="true" aria-labelledby="about-title">
      <button type="button" class="about-close" id="about-close" aria-label="Close about page">×</button>
      <h2 class="about-title" id="about-title">About PintPoint</h2>
      <div class="about-body">
        <p>
          We created this website because we believe in affordable third spaces and supporting local businesses, including the public house.
        </p>
        <p>
          For enquires, please email jamesboucher333@gmail.com
        </p>
        <p>
          Love, Adam and James x
        </p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
  <script type="module">
    import { inject } from 'https://esm.sh/@vercel/analytics';
    inject();
  </script>
</body>
</html>
